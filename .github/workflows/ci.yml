name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시 실행 방지 — 같은 PR/브랜치 push 연속 시 이전 워크플로 취소.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 빌드 시점에는 실 DB 접속 안 함 — placeholder 사용
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      NEXTAUTH_SECRET: ci-build-time-placeholder-secret-must-be-32chars
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-encryption-key-32-chars-placeholder
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npx next build

  prisma-validate:
    name: Prisma schema validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx prisma validate
      - run: npx prisma format --check
